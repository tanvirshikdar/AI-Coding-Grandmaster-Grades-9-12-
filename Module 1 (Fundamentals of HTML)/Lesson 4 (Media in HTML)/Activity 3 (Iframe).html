<!DOCTYPE html>
<html>

<head>
    <title>Iframe</title>
</head>

<body>
    <center>
        <h1>Using Iframe you can show any online video in your project</h1>

        <iframe width="500" height="400" src="https://www.youtube.com/embed/lsCObbRG370?autoplay=1&mute=1"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </center>


</body>

</html>
